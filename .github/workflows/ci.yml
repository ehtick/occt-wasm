name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ts/package-lock.json

      - name: Install TS dependencies
        run: cd ts && npm ci

      - name: TypeScript typecheck
        run: cd ts && npx tsc --noEmit

      - name: ESLint
        run: cd ts && npx eslint src/

      - name: Codegen drift check
        run: |
          cargo xtask codegen
          cargo fmt --all
          if ! git diff --exit-code facade/generated/ crate/src/kernel_generated.rs; then
            echo "::error::Generated code is out of date. Run 'cargo xtask codegen && cargo fmt --all' and commit."
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard facade/generated/)" ]; then
            echo "::error::Codegen produced untracked files in facade/generated/. Commit them."
            exit 1
          fi

  build-test:
    uses: ./.github/workflows/build-wasm.yml

  browser-smoke:
    name: Browser Smoke Test
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: occt-wasm-dist
          path: dist/

      - name: Copy WASM to ts/dist for test imports
        run: mkdir -p ts/dist && cp dist/occt-wasm.js dist/occt-wasm.wasm ts/dist/

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run browser smoke test
        run: npx playwright test
