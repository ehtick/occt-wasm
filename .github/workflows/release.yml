name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v2.0.0). Bypasses release-please."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Skip on workflow_dispatch -- the human knows what tag to publish.
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  build:
    needs: [release-please]
    # Run on a real release-please release OR a manual dispatch. `always()`
    # lets this evaluate even when release-please is skipped.
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/build-wasm.yml
    with:
      release: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: |
      always() && !cancelled() &&
      needs.build.result == 'success' &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}

      # Node 24 ships with npm 11.x, which supports OIDC trusted publishing
      # (added in npm 11.5.1). Avoids the in-place npm self-upgrade bug
      # (`MODULE_NOT_FOUND: promise-retry`) that bites Node 22's npm 10.x.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: cd ts && npm ci

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: occt-wasm-dist
          path: ts/dist/

      # Authenticates via OIDC trusted publisher configured on npmjs.com
      # (Settings -> Trusted Publisher Management -> GitHub Actions).
      # No NODE_AUTH_TOKEN needed - short-lived OIDC token issued per run.
      - name: Publish to npm
        run: cd ts && npm publish --provenance --access public
